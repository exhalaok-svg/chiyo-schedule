<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>課程預約</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    [data-lucide] {
      width: 13px; height: 13px;
      stroke: currentColor;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      vertical-align: -2px;
      flex-shrink: 0;
      display: inline-block;
    }
    .icon-lg [data-lucide] { width: 30px; height: 30px; stroke-width: 1.25; }
    .time [data-lucide]   { width: 15px; height: 15px; vertical-align: -3px; }

    :root {
      --stone:   #B7A7A8;   /* Warm stone — 裝飾用 */
      --stone-d: #7A6A6B;   /* Stone dark — 文字/互動背景，白字對比 5.1:1 ✅ */
      --stone-l: #EDE8E9;   /* Stone light tint */
      --clay:    #C4A882;   /* Soft clay — 裝飾用 */
      --clay-d:  #8A6050;   /* Clay dark — 按鈕，白字對比 5.4:1 ✅ */
      --bg:      #F7F7F7;   /* Pure calm */
      --card:    #ffffff;
      --text:    #363030;   /* 正文，對比 12.1:1 ✅ */
      --muted:   #747070;   /* 說明文字，對比 4.6:1 ✅ */
      --radius:  12px;
      --shadow:  0 2px 12px rgba(0,0,0,.07);
    }

    body {
      font-family: 'Inter', 'Noto Sans TC', 'PingFang TC', sans-serif;
      font-weight: 300;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--stone-l);
      color: var(--text);
      padding: 28px 24px 24px;
      text-align: center;
      border-bottom: 1px solid #D8D0D1;
    }
    header h1 { font-size: 1.4rem; font-weight: 400; letter-spacing: .04em; }
    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      letter-spacing: .22em;
      font-size: 2.1rem;
      vertical-align: middle;
    }
    header p  { font-size: .82rem; color: var(--muted); margin-top: 6px; letter-spacing: .05em; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 32px 20px 40px;
      border-top: 1px solid #E4DFDF;
      margin-top: 20px;
    }
    footer a { display: inline-block; text-decoration: none; }
    footer a:hover { opacity: .75; }
    .footer-logo {
      width: 90px;
      height: 90px;
      object-fit: contain;
    }
    footer p {
      font-size: .78rem;
      color: var(--muted);
      margin-top: 8px;
    }

    /* ── Tabs ── */
    .tab-wrapper {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      border-bottom: 2px solid #E0DCDC;
    }
    .tab-wrapper::after {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 48px;
      background: linear-gradient(to right, transparent, var(--bg) 80%);
      pointer-events: none;
      transition: opacity .25s;
    }
    .tab-wrapper.at-end::after { opacity: 0; }

    .tab-bar {
      display: flex;
      gap: 0;
      padding: 0 16px;
      overflow-x: auto;
      scrollbar-width: none;
      touch-action: pan-x;
      overscroll-behavior-x: contain;
      -webkit-overflow-scrolling: touch;
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .tab {
      flex-shrink: 0;
      padding: 12px 16px;
      border-radius: 0;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      background: transparent;
      color: var(--muted);
      font-size: .85rem;
      font-family: inherit;
      cursor: pointer;
      transition: color .2s, border-color .2s;
      white-space: nowrap;
      font-weight: 400;
    }
    .tab:hover  { color: var(--clay-d); }
    .tab.active { color: var(--clay-d); border-bottom-color: var(--clay-d); font-weight: 600; }

    /* ── Main ── */
    main { padding: 24px 20px 60px; max-width: 960px; margin: 0 auto; }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
    }

    /* ── Course Card ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform .2s, box-shadow .2s;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,.12); }

    .card-top {
      background: var(--stone-l);
      color: var(--text);
      padding: 14px 16px 12px;
      border-bottom: 1px solid #D8D0D1;
    }
    .card-top .time {
      font-size: .92rem;
      font-weight: 500;
      color: var(--clay-d);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card-top h3 { font-size: 1.1rem; font-weight: 700; color: var(--text); }
    .card-teacher {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      font-size: .82rem;
      color: var(--muted);
    }

    .teacher-photo {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      flex-shrink: 0;
    }

    .card-body {
      padding: 12px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--stone-l);
      color: var(--stone-d);
      border-radius: 6px;
      padding: 3px 9px;
      font-size: .78rem;
      font-weight: 500;
    }
    .tag.terra { background: #F5EDE0; color: var(--clay-d); }

    .desc {
      font-size: .82rem;
      color: var(--muted);
      line-height: 1.55;
    }

    .spots {
      font-size: .82rem;
      color: var(--muted);
      padding-top: 10px;
      border-top: 1px solid #EDEAE9;
    }
    .spots span { color: var(--stone-d); font-weight: 500; }

    /* ── Book Button ── */
    .book-btn {
      display: block;
      width: 100%;
      padding: 11px;
      background: var(--clay-d);
      color: #fff;
      border: none;
      font-size: .92rem;
      font-family: inherit;
      font-weight: 700;
      letter-spacing: .03em;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background .2s;
    }
    .book-btn:hover { background: #755950; }
    .book-btn.disabled {
      background: #ccc;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* ── Empty / Loading / Error ── */
    .state-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 1rem;
    }
    .state-msg .icon { margin-bottom: 14px; display: flex; justify-content: center; }
    .state-msg .icon [data-lucide] { width: 32px; height: 32px; stroke-width: 1.25; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--stone-l);
      border-top-color: var(--stone);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .setup-notice {
      background: #F5EDE0;
      border-left: 4px solid var(--clay);
      border-radius: 6px;
      padding: 14px 16px;
      margin-bottom: 24px;
      font-size: .88rem;
      line-height: 1.6;
    }
    .setup-notice code {
      background: #f0ece7;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: .84rem;
    }

    /* ── Points Bar ── */
    .points-bar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 16px 16px 4px;
    }
    .points-btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 28px;
      border-radius: 999px;
      background: var(--clay-d);
      color: #fff;
      font-size: .88rem;
      font-weight: 600;
      letter-spacing: .04em;
      text-decoration: none;
      transition: background .2s;
    }
    .points-btn-primary:hover { background: #755950; }
    .points-link-free {
      font-size: .88rem;
      font-weight: 500;
      color: var(--clay-d);
      background: #F5EDE0;
      border: 1.5px solid var(--clay);
      border-radius: 999px;
      padding: 7px 18px 7px 12px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      animation: pulse-free 2.8s ease-in-out infinite;
    }
    .points-link-free:hover { opacity: .82; }
    @keyframes pulse-free {
      0%, 100% { box-shadow: 0 0 0 0 rgba(196,168,130,0); }
      50%       { box-shadow: 0 0 0 5px rgba(196,168,130,.28); }
    }

    /* ── Workshop Card ── */
    .workshop-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 18px;
    }
    .ws-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform .2s, box-shadow .2s;
    }
    .ws-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,.12); }
    .ws-card-top {
      background: var(--stone-l);
      color: var(--text);
      padding: 16px;
      border-bottom: 1px solid #D8D0D1;
    }
    .ws-card-top .ws-date { font-size: .92rem; font-weight: 500; color: var(--clay-d); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .ws-card-top h3 { font-size: 1.15rem; font-weight: 700; color: var(--text); }
    .ws-card-top .ws-teacher { font-size: .82rem; color: var(--muted); margin-top: 6px; display:flex; align-items:center; gap:6px; }
    .ws-card-body { padding: 14px 16px; flex:1; display:flex; flex-direction:column; gap:8px; }
    .ws-meta { font-size:.82rem; color: var(--muted); display:flex; flex-wrap:wrap; gap:8px; }
    .ws-desc { font-size:.82rem; color: var(--muted); line-height:1.55; }

    /* ── Spots Tags ── */
    .tag.spots-ok     { background: #EAF3EC; color: #3A7A50; }
    .tag.spots-urgent { background: #FDEEE8; color: #A04030; }

    /* ── Free Events List ── */
    .free-events-list {
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1px;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .free-event-item {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--card);
      padding: 16px 20px;
      border-bottom: 1px solid #F0ECEC;
    }
    .free-event-item:last-child { border-bottom: none; }
    .free-event-date {
      min-width: 64px;
      font-size: .82rem;
      color: var(--muted);
      font-weight: 500;
      white-space: nowrap;
    }
    .free-event-day {
      font-size: .78rem;
      color: var(--stone-d);
      background: var(--stone-l);
      border-radius: 4px;
      padding: 2px 7px;
      font-weight: 500;
    }
    .free-event-name {
      flex: 1;
      font-size: .95rem;
      font-weight: 500;
      color: var(--text);
    }
    .free-event-btn {
      flex-shrink: 0;
      padding: 5px 14px;
      border-radius: 999px;
      background: var(--clay-d);
      color: #fff;
      font-size: .78rem;
      font-weight: 600;
      text-decoration: none;
      transition: background .2s;
    }
    .free-event-btn:hover { background: #755950; }

    @media (max-width: 480px) {
      header h1 { font-size: 1.3rem; }
      .grid { grid-template-columns: 1fr; }
      .workshop-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

      desc:'深入理解肩頸痠痛的真正成因與代償模式，透過精準評估、老師徒手結構引導，結合脈輪能量覺察與瑜伽體位，讓肩膀在正位下自然放鬆延展。適合長時間使用電腦或有肩頸不適者。' },
  ];
  // ── 免費活動資料 ──────────────────────────────────────────
  const FREE_EVENTS_DATA = [
    { date:'2026/7/15',  weekday:'三', name:'山林輕內觀', formUrl:'https://docs.google.com/forms/d/1g5dgjAiceb2QeBZlzmIBkLJtKXfkpm3JvTuKhSJUWbM/viewform' },
    { date:'2026/7/29',  weekday:'三', name:'山林輕內觀', formUrl:'https://docs.google.com/forms/d/1g5dgjAiceb2QeBZlzmIBkLJtKXfkpm3JvTuKhSJUWbM/viewform' },
    { date:'2026/8/12',  weekday:'三', name:'山林輕內觀', formUrl:'https://docs.google.com/forms/d/1g5dgjAiceb2QeBZlzmIBkLJtKXfkpm3JvTuKhSJUWbM/viewform' },
    { date:'2026/8/26',  weekday:'三', name:'山林輕內觀', formUrl:'https://docs.google.com/forms/d/1g5dgjAiceb2QeBZlzmIBkLJtKXfkpm3JvTuKhSJUWbM/viewform' },
    { date:'2026/9/16',  weekday:'三', name:'山林輕內觀', formUrl:'https://docs.google.com/forms/d/1g5dgjAiceb2QeBZlzmIBkLJtKXfkpm3JvTuKhSJUWbM/viewform' },
    { date:'2026/9/30',  weekday:'三', name:'山林輕內觀', formUrl:'https://docs.google.com/forms/d/1g5dgjAiceb2QeBZlzmIBkLJtKXfkpm3JvTuKhSJUWbM/viewform' },
  ];
  // ────────────────────────────────────────────────────────

  const DAY_ORDER = ['2','3','4','5','6','7','1'];
  const DAY_LABEL = {
    '1':'週一', '2':'週二', '3':'週三',
    '4':'週四', '5':'週五', '6':'週六', '7':'週日'
  };

  const TEACHER_PHOTOS = {
    'Erin': 'erin.jpg',
    'Dean': 'dean.jpeg'
  };

  let allCourses = [];
  let activeDay  = null;

  async function init() {
    // ── 假資料模式：APPS_SCRIPT_URL 未設定時自動使用 MOCK_DATA ──
    if (APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
      allCourses = MOCK_DATA;
      buildTabs();
      return;
    }

    try {
      const res  = await fetch(APPS_SCRIPT_URL);
      const data = await res.json();
      allCourses = (data.courses || data).filter(c =>
        c.courseName && c.courseName !== ''
      );
      buildTabs();
    } catch (e) {
      setStateMsg('x-circle', '無法載入課程資料，請確認 Apps Script 網址是否正確。');
    }
  }

  function buildTabs() {
    const daysInData  = [...new Set(allCourses.map(c => String(c.weekday || '-')))];
    const orderedDays = DAY_ORDER.filter(d => daysInData.includes(d));

    const bar = document.getElementById('tabBar');
    bar.innerHTML = '';

    orderedDays.forEach((day, i) => {
      const btn = document.createElement('button');
      btn.className = 'tab' + (i === 0 ? ' active' : '');
      btn.textContent = DAY_LABEL[day] || day;
      btn.dataset.day = day;
      btn.addEventListener('click', () => switchTab(day));
      bar.appendChild(btn);
    });

    // 固定 tabs：工作坊、免費活動
    [['workshop', '工作坊'], ['free', '免費活動']].forEach(([key, label]) => {
      const btn = document.createElement('button');
      btn.className = 'tab';
      btn.textContent = label;
      btn.dataset.day = key;
      btn.addEventListener('click', () => switchTab(key));
      bar.appendChild(btn);
    });

    if (orderedDays.length > 0) {
      switchTab(orderedDays[0]);
    } else {
      switchTab('workshop');
    }
  }

  function switchTab(day) {
    activeDay = day;
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.dataset.day === day);
    });
    if (day === 'workshop') {
      renderWorkshops();
    } else if (day === 'free') {
      renderFreeEvents();
    } else {
      renderCourses(day);
    }
  }

  function renderWorkshops() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    document.getElementById('stateArea').style.display = 'none';

    const today = new Date(); today.setHours(0,0,0,0);
    const toDate = str => { const p = str.replace(/-/g,'/').split('/'); return new Date(+p[0],+p[1]-1,+p[2]); };
    const upcoming = WORKSHOP_DATA
      .filter(w => toDate(w.date) >= today)
      .sort((a, b) => toDate(a.date) - toDate(b.date));

    if (upcoming.length === 0) {
      setStateMsg('calendar', '近期工作坊即將公佈，敬請期待');
      return;
    }

    grid.classList.remove('grid');
    grid.classList.add('workshop-grid');

    upcoming.forEach(w => {
      const photoSrc  = TEACHER_PHOTOS[w.teacher] || null;
      const photoHtml = photoSrc
        ? `<img class="teacher-photo" src="${photoSrc}" alt="${w.teacher}">`
        : '';
      const card = document.createElement('div');
      card.className = 'ws-card';
      const spotsHtml = w.full
        ? `<span class="tag spots-urgent"><i data-lucide="clock"></i> 額滿${w.waitlist ? '・候補開放中' : ''}</span>`
        : w.spotsLeft !== undefined
          ? `<span class="tag ${w.spotsLeft <= 2 ? 'spots-urgent' : 'spots-ok'}"><i data-lucide="users"></i> 剩餘 ${w.spotsLeft} 名（${w.spotsTaken}／${w.total}）</span>`
          : (w.max ? `<span class="tag">限額 ${w.max} 人</span>` : '');
      const hasMeta = spotsHtml || (w.location && w.location !== '教室');
      const bodyHtml = (hasMeta || w.desc) ? `
        <div class="ws-card-body">
          ${hasMeta ? `<div class="ws-meta">
            ${spotsHtml}
            ${w.location && w.location !== '教室' ? `<span class="tag terra"><i data-lucide="map-pin"></i> ${w.location}</span>` : ''}
          </div>` : ''}
          ${w.desc ? `<p class="ws-desc">${w.desc}</p>` : ''}
        </div>` : '';
      const btnHtml = w.full && w.waitlist
        ? `<a class="book-btn" href="${w.formUrl}" target="_blank" rel="noopener">候補報名</a>`
        : w.full
          ? `<span class="book-btn disabled">額滿</span>`
          : w.formUrl
            ? `<a class="book-btn" href="${w.formUrl}" target="_blank" rel="noopener">立即報名</a>`
            : `<span class="book-btn disabled">報名即將開放</span>`;
      card.innerHTML = `
        <div class="ws-card-top">
          <div class="ws-date"><i data-lucide="calendar"></i> ${w.date || ''}${w.time ? '　' + w.time : ''}</div>
          <h3>${w.name}</h3>
          ${w.teacher ? `<div class="ws-teacher">${photoHtml} ${w.teacher}</div>` : ''}
        </div>
        ${bodyHtml}
        ${btnHtml}
      `;
      grid.appendChild(card);
    });
    lucide.createIcons();
  }

  function renderFreeEvents() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    grid.className = '';
    document.getElementById('stateArea').style.display = 'none';

    const today = new Date(); today.setHours(0,0,0,0);
    const upcoming = FREE_EVENTS_DATA.filter(e => {
      const parts = e.date.replace(/-/g, '/').split('/');
      return new Date(+parts[0], +parts[1] - 1, +parts[2]) >= today;
    });

    if (upcoming.length === 0) {
      setStateMsg('calendar', '近期免費活動即將公佈，敬請期待');
      return;
    }

    const list = document.createElement('div');
    list.className = 'free-events-list';

    upcoming.forEach(e => {
      const parts = e.date.replace(/-/g, '/').split('/');
      const mm = parts[1].replace(/^0/, '');
      const dd = parts[2].replace(/^0/, '');
      const item = document.createElement('div');
      item.className = 'free-event-item';
      item.innerHTML = `
        <span class="free-event-date">${mm}/${dd}</span>
        <span class="free-event-day">（${e.weekday}）</span>
        <span class="free-event-name">${e.name}</span>
        ${e.formUrl
          ? `<a class="free-event-btn" href="${e.formUrl}" target="_blank" rel="noopener">報名</a>`
          : ''}
      `;
      list.appendChild(item);
    });

    grid.appendChild(list);
  }

  function renderCourses(day) {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    grid.classList.remove('workshop-grid');
    grid.classList.add('grid');
    document.getElementById('stateArea').style.display = 'none';

    const filtered = allCourses
      .filter(c => String(c.weekday || '-') === day)
      .sort((a, b) => compareTime(a.startTime, b.startTime));

    if (filtered.length === 0) {
      setStateMsg('inbox', '這天目前沒有課程');
      return;
    }

    filtered.forEach(c => {
      grid.appendChild(buildCard(c));
    });
    lucide.createIcons();
  }

  function buildCard(c) {
    const isMock     = c.formId === 'DEMO';
    const hasForm    = c.formId && c.formId !== '-' && c.formId !== '';
    const formUrl    = (hasForm && !isMock) ? `https://docs.google.com/forms/d/${c.formId}/viewform` : null;
    const timeLabel  = c.startTime ? formatTime(c.startTime) : '';
    const durLabel   = c.duration  ? `${c.duration} 小時` : '';
    const maxLabel   = c.max && c.max !== '0' ? `限額 ${c.max} 人` : '';
    const desc       = c['課程介紹'] || '';
    const loc        = c.location || '';
    const teacher    = c.teacher  || '';
    const photoSrc   = TEACHER_PHOTOS[teacher] || null;
    const photoHtml  = photoSrc
      ? `<img class="teacher-photo" src="${photoSrc}" alt="${teacher}">`
      : '<i data-lucide="user"></i>';
    const showLoc    = loc && loc !== '教室';

    const card = document.createElement('div');
    card.className = 'card';

    card.innerHTML = `
      <div class="card-top">
        <div class="time">
          ${timeLabel ? `<i data-lucide="clock"></i> ${timeLabel}` : ''}
          ${durLabel  ? `&nbsp;·&nbsp;${durLabel}` : ''}
        </div>
        <h3>${c.courseName}</h3>
        ${teacher ? `<div class="card-teacher">${photoHtml} ${teacher}</div>` : ''}
      </div>
      <div class="card-body">
        ${showLoc ? `<div class="meta-row"><span class="tag terra"><i data-lucide="map-pin"></i> ${loc}</span></div>` : ''}
        ${desc ? `<p class="desc">${desc}</p>` : ''}
        ${maxLabel ? `<p class="spots"><span>${maxLabel}</span></p>` : ''}
      </div>
      ${hasForm && formUrl
        ? `<a class="book-btn" href="${formUrl}" target="_blank" rel="noopener">立即預約</a>`
        : hasForm && isMock
        ? `<span class="book-btn" style="cursor:default">立即預約（示範）</span>`
        : `<span class="book-btn disabled">目前未開放預約</span>`
      }
    `;
    return card;
  }

  function setStateMsg(iconName, text) {
    const area = document.getElementById('stateArea');
    area.style.display = 'block';
    area.innerHTML = `<div class="icon"><i data-lucide="${iconName}"></i></div><div>${text}</div>`;
    document.getElementById('grid').innerHTML = '';
    lucide.createIcons();
  }

  function formatTime(t) {
    if (!t) return '';
    // Already formatted like "10:00 AM" or "10:00"
    const s = String(t);
    if (s.includes('AM') || s.includes('PM')) return s;
    // Google Sheets serial time: fraction of a day
    if (!isNaN(s) && s.includes('.')) {
      const totalMins = Math.round(parseFloat(s) * 24 * 60);
      const h = Math.floor(totalMins / 60);
      const m = totalMins % 60;
      return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
    }
    return s;
  }

  function compareTime(a, b) {
    const toMin = t => {
      if (!t) return 9999;
      const s = String(t);
      if (!isNaN(s) && s.includes('.')) return parseFloat(s) * 1440;
      const m = s.match(/(\d+):(\d+)\s*(AM|PM)?/i);
      if (!m) return 9999;
      let h = parseInt(m[1]), min = parseInt(m[2]);
      if (m[3] && m[3].toUpperCase() === 'PM' && h !== 12) h += 12;
      if (m[3] && m[3].toUpperCase() === 'AM' && h === 12) h = 0;
      return h * 60 + min;
    };
    return toMin(a) - toMin(b);
  }

  init();

  // Tab bar fade: hide right gradient when scrolled to end
  const tabBar     = document.getElementById('tabBar');
  const tabWrapper = document.getElementById('tabWrapper');
  function updateTabFade() {
    const atEnd = tabBar.scrollLeft + tabBar.clientWidth >= tabBar.scrollWidth - 4;
    tabWrapper.classList.toggle('at-end', atEnd);
  }
  tabBar.addEventListener('scroll', updateTabFade, { passive: true });
  // Run once after tabs are built so initial state is correct
  setTimeout(updateTabFade, 0);
</script>
